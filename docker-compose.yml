services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: videosearch
      POSTGRES_USER: videosearch
      POSTGRES_PASSWORD: videosearch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videosearch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
