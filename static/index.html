<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Search Eval Workbench</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .result-card { transition: box-shadow .15s ease; }
    .result-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-900">

  <div class="max-w-[1600px] mx-auto px-4 py-8">

    <!-- Header -->
    <h1 class="text-2xl font-bold mb-1">Video Search Eval Workbench</h1>
    <p id="status" class="text-sm text-gray-500 mb-4"></p>

    <!-- Upload section (collapsible) -->
    <details class="mb-6 bg-white rounded-lg border border-gray-200 shadow-sm">
      <summary class="px-4 py-3 cursor-pointer text-sm font-semibold text-gray-700 hover:text-gray-900">
        Manage Videos
      </summary>
      <div class="px-4 pb-4">
        <div id="upload-zone" class="mt-2 border-2 border-dashed border-gray-300 rounded-lg p-6 text-center
                    hover:border-blue-400 transition cursor-pointer">
          <p class="text-gray-500 text-sm">Drop .mp4 files here or click to upload</p>
          <input id="file-input" type="file" accept="video/mp4" multiple class="hidden" />
        </div>
        <div id="upload-progress" class="mt-2 hidden">
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div id="upload-bar" class="bg-blue-600 h-2 rounded-full transition-all" style="width:0%"></div>
          </div>
          <p id="upload-status" class="text-xs text-gray-500 mt-1"></p>
        </div>
        <div id="video-list" class="mt-4"></div>
      </div>
    </details>

    <!-- Search bar -->
    <form id="search-form" class="flex gap-3 mb-8">
      <input
        id="search-input"
        type="text"
        placeholder="Describe what you're looking for..."
        autocomplete="off"
        class="flex-1 px-4 py-3 rounded-lg border border-gray-300 shadow-sm
               focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
      />
      <button
        type="submit"
        class="px-8 py-3 bg-blue-600 text-white rounded-lg font-semibold
               hover:bg-blue-700 active:bg-blue-800 transition shadow-sm"
      >Search</button>
    </form>

    <!-- Results -->
    <div id="results"></div>
  </div>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
